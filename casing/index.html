<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Casing</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>Aa</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"
        integrity="sha512-jnSuA4Ss2PkkikSOLtYs8BlYIeeIK1h99ty4YfvRPAlzr377vr3CXDb7sb7eEEBYjDtcYj+AjBH3FLv5uSJuXg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            color-scheme: light;
            --primary-color: #4361ee;
            --primary-light: #eef2ff;
            --secondary-color: #3f37c9;
            --header-bg: #d4e4ff;
            --header-text: #2b5797;
            --text-dark: #2b2d42;
            --text-muted: #6c757d;
            --placeholder-color: #6c757d;
            --bg-light: #f8f9fa;
            --white: #ffffff;
            --success: #28a745;
            --border-color: #e9ecef;
            --output-bg: #ffffff;
            --border-radius: 10px;
            --box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                color-scheme: dark;
                --primary-light: #1e2a4a;
                --header-bg: #1a2744;
                --header-text: #a8c7fa;
                --text-dark: #e8eaed;
                --text-muted: #9aa0a6;
                --placeholder-color: #9aa0a6;
                --bg-light: #121212;
                --white: #1e1e1e;
                --border-color: #3c4043;
                --output-bg: #2d2d2d;
                --box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
            }
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
        }

        .app-container {
            max-width: 960px;
            margin: 2rem auto;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            background-color: var(--white);
            overflow: hidden;
        }

        .app-header {
            padding: 1.25rem 1.5rem;
            text-align: center;
            background: var(--header-bg);
            color: var(--header-text);
            border-bottom: 1px solid rgba(67, 97, 238, 0.1);
        }

        .app-title {
            margin-bottom: 0.25rem;
            color: var(--header-text);
            font-weight: 600;
            letter-spacing: 0.5px;
            font-size: 1.75rem;
        }

        .app-subtitle {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.95rem;
            margin-bottom: 0;
        }

        .content-area {
            padding: 2rem 2.5rem 2.5rem;
        }

        .form-label {
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .form-control {
            border-radius: 8px;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            background-color: var(--output-bg);
            color: var(--text-dark);
            transition: var(--transition);
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(67, 97, 238, 0.15);
            border-color: var(--primary-color);
            background-color: var(--output-bg);
            color: var(--text-dark);
        }

        .form-control::placeholder {
            color: var(--placeholder-color);
            opacity: 1;
        }

        #inputText {
            min-height: 160px;
            resize: vertical;
            line-height: 1.6;
        }

        .input-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .stats {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stats span + span::before {
            content: "·";
            margin: 0 0.4rem;
        }

        .btn-clear {
            font-size: 0.85rem;
            padding: 0.35rem 0.75rem;
            color: var(--text-muted);
            border-color: var(--border-color);
            background: transparent;
        }

        .btn-clear:hover {
            color: var(--text-dark);
            background-color: var(--primary-light);
            border-color: var(--primary-color);
        }

        .output-section {
            margin-top: 1.75rem;
        }

        .case-group {
            margin-bottom: 1.75rem;
        }

        .case-group:last-child {
            margin-bottom: 0;
        }

        .case-group-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .output-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .output-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .output-card {
            background-color: var(--output-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem 1.125rem;
            margin-bottom: 1rem;
            transition: var(--transition);
        }

        .output-card:last-child {
            margin-bottom: 0;
        }

        .output-card:hover {
            border-color: rgba(67, 97, 238, 0.35);
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.625rem;
        }

        .case-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--primary-color);
            margin-bottom: 0;
        }

        .case-badge {
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
            background-color: var(--primary-light);
            color: var(--primary-color);
            text-transform: none;
            letter-spacing: 0;
            margin-left: 0.5rem;
        }

        .output-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .copy-btn {
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            color: var(--primary-color);
            background-color: var(--primary-light);
            border: 1px solid rgba(67, 97, 238, 0.25);
            line-height: 1;
            border-radius: 6px;
        }

        .copy-btn svg {
            width: 1.15rem;
            height: 1.15rem;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            color: var(--secondary-color);
            background-color: var(--primary-light);
            border-color: var(--primary-color);
        }

        .copy-btn.copied {
            color: var(--success);
            border-color: var(--success);
            background-color: rgba(40, 167, 69, 0.12);
        }

        .output-text {
            font-size: 1rem;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
            min-height: 1.6em;
            color: var(--text-dark);
        }

        .output-text.empty {
            color: var(--placeholder-color);
            font-style: italic;
        }

        @media (max-width: 576px) {
            .app-container {
                margin: 1rem;
                border-radius: 8px;
            }

            .content-area {
                padding: 1.25rem 1.25rem 1.75rem;
            }

            .app-title {
                font-size: 1.45rem;
            }
        }
    </style>
</head>

<body>
    <div class="container px-0 px-sm-3">
        <div class="app-container">
            <header class="app-header">
                <h1 class="app-title">Casing</h1>
                <p class="app-subtitle">Convert text between upper, lower, title, camelCase, snake_case, kebab-case, and more</p>
            </header>

            <main class="content-area">
                <div class="input-toolbar">
                    <label for="inputText" class="form-label mb-0">Input text</label>
                    <div class="d-flex align-items-center gap-2">
                        <div class="stats" aria-live="polite">
                            <span id="charCount">0 characters</span>
                            <span id="wordCount">0 words</span>
                        </div>
                        <button type="button" class="btn btn-sm btn-clear" id="clearBtn" title="Clear input">
                            Clear
                        </button>
                    </div>
                </div>
                <textarea class="form-control" id="inputText"
                    placeholder="Paste or type your text here…" spellcheck="true" autofocus></textarea>

                <section class="output-section" id="outputSection" aria-label="Converted text"></section>
            </main>
        </div>
    </div>

    <script>
        const inputText = document.getElementById('inputText');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const clearBtn = document.getElementById('clearBtn');
        const outputSection = document.getElementById('outputSection');

        const clipboardIcon = '<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0z"/></svg>';
        const checkIcon = '<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425z"/></svg>';

        const AP_SMALL_WORDS = new Set([
            'a', 'an', 'the', 'and', 'but', 'or', 'for', 'nor', 'on', 'at', 'to',
            'from', 'by', 'in', 'of', 'as', 'yet', 'so', 'if', 'per', 'via', 'vs', 'vs.'
        ]);

        const outputs = {};
        const converted = {};

        function splitIntoWords(text) {
            return text
                .replace(/([a-z0-9])([A-Z])/g, '$1 $2')
                .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')
                .split(/[\s_\-.\\/]+/)
                .filter(Boolean);
        }

        function capitalizeWord(word) {
            if (!word) return '';
            return word.charAt(0).toLocaleUpperCase() + word.slice(1).toLocaleLowerCase();
        }

        function joinWords(text, separator, transform) {
            const words = splitIntoWords(text);
            if (!words.length) return '';
            return words.map(transform).join(separator);
        }

        function toSentenceCase(text) {
            return text
                .toLocaleLowerCase()
                .replace(/(^|[.!?]\s+|\n\s*)([a-z])/g, (_, prefix, letter) => prefix + letter.toLocaleUpperCase())
                .replace(/\bi\b/g, 'I');
        }

        function toTitleCase(text) {
            return joinWords(text, ' ', capitalizeWord);
        }

        function toApTitleCase(text) {
            const words = splitIntoWords(text);
            if (!words.length) return '';
            return words.map((word, index) => {
                const lower = word.toLocaleLowerCase();
                if (index !== 0 && index !== words.length - 1 && AP_SMALL_WORDS.has(lower)) {
                    return lower;
                }
                return capitalizeWord(word);
            }).join(' ');
        }

        function toCamelCase(text) {
            const words = splitIntoWords(text);
            if (!words.length) return '';
            return words.map((word, index) => {
                const lower = word.toLocaleLowerCase();
                return index === 0 ? lower : capitalizeWord(lower);
            }).join('');
        }

        function toPascalCase(text) {
            return joinWords(text, '', capitalizeWord);
        }

        function toCapitalize(text) {
            if (!text) return '';
            return text.charAt(0).toLocaleUpperCase() + text.slice(1).toLocaleLowerCase();
        }

        function toInverseCase(text) {
            return text.split('').map(char => {
                const upper = char.toLocaleUpperCase();
                const lower = char.toLocaleLowerCase();
                if (char === upper && char !== lower) return lower;
                if (char === lower && char !== upper) return upper;
                return char;
            }).join('');
        }

        function toAlternatingCase(text) {
            let letterIndex = 0;
            return text.split('').map(char => {
                if (!/[a-zA-Z]/.test(char)) return char;
                const result = letterIndex % 2 === 0
                    ? char.toLocaleLowerCase()
                    : char.toLocaleUpperCase();
                letterIndex += 1;
                return result;
            }).join('');
        }

        function toSpongeBobCase(text) {
            return text.split(/(\s+)/).map(part => {
                if (/^\s+$/.test(part)) return part;
                let letterIndex = 0;
                return part.split('').map(char => {
                    if (!/[a-zA-Z]/.test(char)) return char;
                    const result = letterIndex % 2 === 0
                        ? char.toLocaleLowerCase()
                        : char.toLocaleUpperCase();
                    letterIndex += 1;
                    return result;
                }).join('');
            }).join('');
        }

        const CASE_GROUPS = [
            {
                title: 'Basic',
                cases: [
                    { id: 'upper', label: 'Upper case', badge: 'UPPERCASE', convert: text => text.toLocaleUpperCase() },
                    { id: 'lower', label: 'Lower case', badge: 'lowercase', convert: text => text.toLocaleLowerCase() },
                    { id: 'sentence', label: 'Sentence case', badge: 'Sentence case', convert: toSentenceCase },
                    { id: 'capitalize', label: 'Capitalize', badge: 'Hello world', convert: toCapitalize }
                ]
            },
            {
                title: 'Title',
                cases: [
                    { id: 'title', label: 'Title Case', badge: 'Hello World', convert: toTitleCase },
                    { id: 'titleAp', label: 'AP Title Case', badge: 'The Lord of the Rings', convert: toApTitleCase }
                ]
            },
            {
                title: 'Developer',
                cases: [
                    { id: 'camel', label: 'camelCase', badge: 'helloWorld', convert: toCamelCase },
                    { id: 'pascal', label: 'PascalCase', badge: 'HelloWorld', convert: toPascalCase },
                    { id: 'snake', label: 'snake_case', badge: 'hello_world', convert: text => joinWords(text, '_', w => w.toLocaleLowerCase()) },
                    { id: 'screamingSnake', label: 'SCREAMING_SNAKE', badge: 'HELLO_WORLD', convert: text => joinWords(text, '_', w => w.toLocaleUpperCase()) },
                    { id: 'kebab', label: 'kebab-case', badge: 'hello-world', convert: text => joinWords(text, '-', w => w.toLocaleLowerCase()) },
                    { id: 'train', label: 'Train-Case', badge: 'Hello-World', convert: text => joinWords(text, '-', capitalizeWord) },
                    { id: 'dot', label: 'dot.case', badge: 'hello.world', convert: text => joinWords(text, '.', w => w.toLocaleLowerCase()) },
                    { id: 'path', label: 'path/case', badge: 'hello/world', convert: text => joinWords(text, '/', w => w.toLocaleLowerCase()) }
                ]
            },
            {
                title: 'Transform',
                cases: [
                    { id: 'inverse', label: 'Inverse case', badge: 'hELLO wORLD', convert: toInverseCase },
                    { id: 'alternating', label: 'Alternating case', badge: 'hElLo WoRlD', convert: toAlternatingCase },
                    { id: 'spongebob', label: 'SpongeBob case', badge: 'hElLo WoRlD', convert: toSpongeBobCase }
                ]
            }
        ];

        function renderOutputCards() {
            outputSection.innerHTML = CASE_GROUPS.map(group => `
                <div class="case-group">
                    <h2 class="case-group-title">${group.title}</h2>
                    <div class="output-grid">
                        ${group.cases.map(caseType => `
                            <div class="output-card">
                                <div class="output-header">
                                    <h3 class="case-label">
                                        ${caseType.label}
                                        <span class="case-badge">${caseType.badge}</span>
                                    </h3>
                                    <div class="output-actions">
                                        <button type="button" class="copy-btn" data-target="${caseType.id}" title="Copy ${caseType.label}" aria-label="Copy ${caseType.label}">
                                            ${clipboardIcon}
                                        </button>
                                    </div>
                                </div>
                                <div class="output-text empty" id="output-${caseType.id}">Converted text will appear here</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            for (const group of CASE_GROUPS) {
                for (const caseType of group.cases) {
                    outputs[caseType.id] = document.getElementById(`output-${caseType.id}`);
                    converted[caseType.id] = '';
                }
            }

            outputSection.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    copyText(converted[btn.dataset.target], btn.dataset.target);
                });
            });
        }

        function countWords(text) {
            const trimmed = text.trim();
            if (!trimmed) return 0;
            return trimmed.split(/\s+/).length;
        }

        function updateOutputs() {
            const text = inputText.value;
            const words = countWords(text);

            charCount.textContent = `${text.length} character${text.length === 1 ? '' : 's'}`;
            wordCount.textContent = `${words} word${words === 1 ? '' : 's'}`;

            for (const group of CASE_GROUPS) {
                for (const caseType of group.cases) {
                    const el = outputs[caseType.id];
                    if (!text) {
                        converted[caseType.id] = '';
                        el.textContent = 'Converted text will appear here';
                        el.classList.add('empty');
                        continue;
                    }

                    converted[caseType.id] = caseType.convert(text);
                    el.textContent = converted[caseType.id];
                    el.classList.remove('empty');
                }
            }
        }

        function copyText(text, target) {
            if (!text) return;

            const btn = document.querySelector(`.copy-btn[data-target="${target}"]`);
            const defaultLabel = btn.getAttribute('aria-label');

            const onSuccess = () => {
                btn.innerHTML = checkIcon;
                btn.classList.add('copied');
                btn.setAttribute('aria-label', 'Copied');

                setTimeout(() => {
                    btn.innerHTML = clipboardIcon;
                    btn.classList.remove('copied');
                    btn.setAttribute('aria-label', defaultLabel);
                }, 2000);
            };

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(onSuccess).catch(() => fallbackCopy(text, onSuccess));
            } else {
                fallbackCopy(text, onSuccess);
            }
        }

        function fallbackCopy(text, onSuccess) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'absolute';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                onSuccess();
            } catch (e) {
                /* ignore */
            }
            document.body.removeChild(textarea);
        }

        renderOutputCards();

        inputText.addEventListener('input', updateOutputs);
        inputText.addEventListener('paste', () => setTimeout(updateOutputs, 0));

        clearBtn.addEventListener('click', () => {
            inputText.value = '';
            updateOutputs();
            inputText.focus();
        });

        updateOutputs();
    </script>
</body>

</html>
