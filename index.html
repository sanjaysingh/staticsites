<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility Web Applications</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" integrity="sha512-jnSuA4Ss2PkkikSOLtYs8BlYIeeIK1h99ty4YfvRPAlzr377vr3CXDb7sb7eEEBYjDtcYj+AjBH3FLv5uSJuXg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" integrity="sha512-dPXYcDub/aeb08c63jRq/k6GaKccl256JQy/AnOq7CAnEZ9FzSL9wSbcZkMp4R26vBsMLFYH4kQ67/bbV8XaCQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            background-color: #f8f9fa;
            color: #212529;
            min-height: 100vh;
        }
        .github-link {
            position: fixed;
            top: 1rem;
            right: 1rem;
            font-size: 1.75rem;
            color: #212529;
            text-decoration: none;
        }
        .github-link:hover {
            color: #000;
        }
        .home {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100dvh;
            padding: max(18vh, 5rem) 1rem 2rem;
        }
        .home-title {
            font-size: 1.75rem;
            font-weight: 400;
            margin-bottom: 2rem;
            text-align: center;
        }
        .search-wrap {
            position: relative;
            width: 100%;
            max-width: 584px;
        }
        .search-field {
            position: relative;
        }
        #search {
            width: 100%;
            padding: 0.85rem 1.25rem;
            font-size: 1.1rem;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            outline: none;
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.08);
            transition: box-shadow 0.2s;
        }
        #search:focus {
            border-color: transparent;
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.15), 0 0 0 1px rgba(32, 33, 36, 0.08);
        }
        #search:disabled {
            background: #f1f3f4;
        }
        #hint {
            margin-top: 1.5rem;
            min-height: 2.8em;
            color: #70757a;
            font-size: 0.9rem;
            line-height: 1.4;
            text-align: center;
        }
        #results {
            position: absolute;
            top: calc(100% + 0.5rem);
            left: 0;
            right: 0;
            z-index: 10;
            max-height: min(50dvh, 20rem);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(32, 33, 36, 0.12);
        }
        #results:empty {
            display: none;
        }
        .result-item {
            display: block;
            width: 100%;
            padding: 0.75rem 1.25rem;
            border: none;
            border-bottom: 1px solid #f1f3f4;
            background: #fff;
            text-align: left;
            font-size: 1rem;
            color: #202124;
            cursor: pointer;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-item:hover,
        .result-item.active {
            background: #f1f3f4;
        }
    </style>
</head>
<body>
    <a href="https://github.com/sanjaysingh/staticsites" class="github-link" target="_blank" rel="noopener" title="View on GitHub" aria-label="View on GitHub">
        <i class="bi bi-github"></i>
    </a>

    <main class="home">
        <h1 class="home-title">Utility Web Applications</h1>
        <div class="search-wrap">
            <div class="search-field">
                <input
                    type="search"
                    id="search"
                    disabled
                    placeholder="Loading…"
                    autocomplete="off"
                    spellcheck="false"
                    aria-label="Search apps"
                    aria-autocomplete="list"
                    aria-controls="results"
                />
                <div id="results" role="listbox"></div>
            </div>
            <p id="hint">Examples: case, jwt, pdf, hash, uuid</p>
        </div>
    </main>

    <script src="apps.js?v=__BUILD_ID__"></script>
    <script src="home.js?v=__BUILD_ID__"></script>
</body>
</html>
