<!DOCTYPE html>
<html>

<head>
  <title>Ticking Stopwatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    /* 7-segment digital clock font - strictly monospace for no layout bounce */
    .digital-font {
      font-family: 'Share Tech Mono', monospace;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
    }

    /* Full-width time display - fits exactly 5 chars (MM:SS) - bigger since fewer chars */
    .time-display {
      font-size: clamp(4rem, 28vw, 20rem);
      line-height: 1;
      white-space: nowrap;
      padding: 0 max(20px, env(safe-area-inset-left), env(safe-area-inset-right));
    }

    /* Neon glow effect for dark mode */
    @media (prefers-color-scheme: dark) {
      .bg-auto {
        background-color: #0a0a0f;
      }

      .text-auto {
        color: #00ff41;
        text-shadow: 0 0 10px rgba(0, 255, 65, 0.5),
                     0 0 20px rgba(0, 255, 65, 0.3),
                     0 0 30px rgba(0, 255, 65, 0.1);
      }

      .text-dim {
        color: #1a3a1a;
      }
    }

    @media (prefers-color-scheme: light) {
      .bg-auto {
        background-color: #f5f5f0;
      }

      .text-auto {
        color: #1a1a1a;
      }

      .text-dim {
        color: #cccccc;
      }
    }

    /* Modern button styles */
    .icon-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
      font-size: 2.5rem;
    }

    .icon-btn:active {
      transform: scale(0.95);
    }

    .btn-start {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
    }

    .btn-start:hover {
      box-shadow: 0 6px 20px rgba(34, 197, 94, 0.6);
    }

    .btn-stop {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
    }

    .btn-stop:hover {
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
    }

    .btn-reset {
      background: linear-gradient(135deg, #6b7280, #4b5563);
      box-shadow: 0 4px 15px rgba(107, 114, 128, 0.3);
    }

    .btn-reset:hover {
      box-shadow: 0 6px 20px rgba(107, 114, 128, 0.5);
    }

    /* Mute button - top right corner with safe area support */
    .mute-btn {
      position: absolute;
      top: max(10px, env(safe-area-inset-top));
      right: max(10px, env(safe-area-inset-right));
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.5rem;
      transition: all 0.2s ease;
      z-index: 100;
    }

    @media (prefers-color-scheme: dark) {
      .mute-btn {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    }

    .mute-btn:hover {
      transform: scale(1.1);
    }

    /* Landscape mode: increase margins to avoid camera notch and mute button overlap */
    @media (orientation: landscape) {
      .time-display {
        padding-left: max(60px, env(safe-area-inset-left));
        padding-right: max(70px, env(safe-area-inset-right));
      }
    }
  </style>
</head>

<body class="h-screen flex flex-col justify-center items-center bg-auto overflow-hidden">

  <div id="app" class="w-full h-full flex flex-col justify-center items-center relative">
    <!-- Mute Button - Top Right (inside Vue app) -->
    <button @click="toggleMute" class="mute-btn" :title="muted ? 'Unmute' : 'Mute'">
      <span v-if="muted">🔇</span>
      <span v-else>🔊</span>
    </button>

    <!-- Main Time Display - Full Width -->
    <div class="time-display digital-font text-auto mb-8 select-none" aria-live="polite">
      {{ formattedTime }}
    </div>

    <!-- Control Buttons -->
    <div class="button-group flex justify-center items-center gap-6">
      <button @click="startStop"
        :class="running ? 'btn-stop' : 'btn-start'"
        class="icon-btn text-white"
        :title="running ? 'Stop' : 'Start'">
        <span v-if="running">⏹</span>
        <span v-else>▶</span>
      </button>
      <button @click="reset"
        class="icon-btn btn-reset text-white"
        title="Reset">
        ↺
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>

  <script>
    new Vue({
      el: '#app',
      data: {
        running: false,
        time: 0,
        animationFrame: null,
        tick: null,
        tickAudioFile: "clock-tick.mp3",
        muted: false,
        wakeLock: null,
        wakeLockSupported: 'wakeLock' in navigator,
        // Timestamp-based timing
        startTime: null,
        lastSecond: -1,
        // Audio scheduling
        nextTickTime: 0,
        audioContext: null
      },
      computed: {
        formattedTime() {
          const totalMinutes = Math.floor(this.time / 60);
          const minutes = totalMinutes % 100; // Wrap around at 99 minutes
          const seconds = this.time % 60;
          return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
      },
      mounted() {
        document.addEventListener('visibilitychange', this.handleVisibilityChange);
        // Preload audio
        this.preloadAudio();
      },
      beforeDestroy() {
        document.removeEventListener('visibilitychange', this.handleVisibilityChange);
        this.releaseWakeLock();
        cancelAnimationFrame(this.animationFrame);
      },
      methods: {
        preloadAudio() {
          // Preload the audio file to reduce latency
          this.tick = new Audio(this.tickAudioFile);
          this.tick.load();
        },
        async requestWakeLock() {
          if (this.wakeLockSupported && !this.wakeLock) {
            try {
              this.wakeLock = await navigator.wakeLock.request('screen');
              this.wakeLock.addEventListener('release', () => {
                this.wakeLock = null;
              });
            } catch (err) {
              console.log('Wake Lock request failed:', err.message);
            }
          }
        },
        releaseWakeLock() {
          if (this.wakeLock) {
            this.wakeLock.release();
            this.wakeLock = null;
          }
        },
        handleVisibilityChange() {
          // When becoming visible again, re-acquire wake lock if running
          if (document.visibilityState === 'visible' && this.running) {
            this.requestWakeLock();
          }
        },
        toggleMute() {
          this.muted = !this.muted;
        },
        playTick() {
          if (this.muted) return;

          // Create a new audio instance each time for precise timing
          const tickSound = new Audio(this.tickAudioFile);
          tickSound.volume = 0.7;

          // Play immediately
          const playPromise = tickSound.play();
          if (playPromise !== undefined) {
            playPromise.catch(err => {
              console.log('Audio play failed:', err.message);
            });
          }

          // Auto-cleanup after play
          tickSound.addEventListener('ended', () => {
            tickSound.remove();
          });
        },
        // Precision timing loop using requestAnimationFrame + Date.now()
        tickLoop() {
          if (!this.running) return;

          const now = Date.now();
          const elapsedMs = now - this.startTime;
          const elapsedSeconds = Math.floor(elapsedMs / 1000);

          // Update time display
          this.time = elapsedSeconds;

          // Play tick exactly when second boundary crosses
          if (elapsedSeconds !== this.lastSecond) {
            this.lastSecond = elapsedSeconds;
            this.playTick();
          }

          // Continue loop
          this.animationFrame = requestAnimationFrame(() => this.tickLoop());
        },
        async startStop() {
          if (!this.running) {
            // START
            this.running = true;
            this.startTime = Date.now() - (this.time * 1000);
            this.lastSecond = this.time;
            await this.requestWakeLock();
            this.tickLoop();
          } else {
            // STOP
            this.running = false;
            cancelAnimationFrame(this.animationFrame);
            this.releaseWakeLock();
          }
        },
        reset() {
          this.running = false;
          this.time = 0;
          this.startTime = null;
          this.lastSecond = -1;
          cancelAnimationFrame(this.animationFrame);
          this.releaseWakeLock();
        }
      }
    });
  </script>

</body>

</html>
